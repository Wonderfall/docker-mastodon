name: Publish

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - ".dockerignore"
      - "Dockerfile"
      - "patches/**"
      - "rootfs/**"
      - "signing/**"
  schedule:
    - cron: "0 22 * * 5"

permissions: {}

concurrency:
  group: publish-image
  cancel-in-progress: false

jobs:
  publish:
    name: Build, publish, and sign image
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Normalize image name
        id: image
        env:
          REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: |
          owner="$(printf '%s' "${REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "name=ghcr.io/${owner}/mastodon" >>"${GITHUB_OUTPUT}"

      - name: Extract image version tags
        id: version
        run: |
          full_version="$(awk -F= '/^ARG MASTODON_VERSION=/{print $2; exit}' Dockerfile)"
          major_minor="${full_version%.*}"
          echo "full=${full_version}" >>"${GITHUB_OUTPUT}"
          echo "major_minor=${major_minor}" >>"${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Log in to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.version.outputs.full }}
            type=raw,value=${{ steps.version.outputs.major_minor }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: .
          pull: true
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=publish
          cache-to: type=gha,mode=max,scope=publish

      - name: Install Cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1
        with:
          cosign-release: v3.0.2

      - name: Sign the published image
        run: cosign sign --yes "${{ steps.image.outputs.name }}@${{ steps.build.outputs.digest }}"
